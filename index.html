<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUS-kode Velger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }

        /* Synlig fokusindikator for alle interaktive elementer (WCAG 2.4.7) */
        :focus-visible {
            outline: 2px solid #a78bfa;
            outline-offset: 2px;
            border-radius: 6px;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">

    <!-- Hopp til innhold (WCAG 2.4.1) -->
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 focus:z-50 focus:px-4 focus:py-2 focus:bg-violet-600 focus:text-white focus:rounded-lg focus:font-medium">
        Hopp til innhold
    </a>

    <!-- aria-live-region for dynamiske statusmeldinger (WCAG 4.1.3) -->
    <div id="status-announcer" aria-live="polite" aria-atomic="true" class="sr-only"></div>

    <div id="app" role="main" id="main-content"></div>

    <script>
        // Data og state
        let nusData = [];
        let codeIndex = new Map();
        let childrenIndex = new Map();
        let searchIndex = [];

        let state = {
            mode: 'intro',
            searchQuery: '',
            selectedPath: [],
            selectedCode: null,
            showAllResults: false,
            copied: false
        };

        // Søkealiaser
        const searchAliases = {
            "it": ["informasjonsteknologi", "datateknologi", "informatikk", "data"],
            "ai": ["kunstig intelligens", "maskinlæring", "artificial intelligence"],
            "ml": ["maskinlæring", "kunstig intelligens", "machine learning"],
            "ikt": ["informasjonsteknologi", "datateknologi"],
            "data": ["datateknologi", "informatikk", "dataingeniør", "data science"],
            "økonomi": ["bedriftsøkonomi", "økonomi og administrasjon", "finans", "økonomisk"],
            "helse": ["sykepleie", "medisin", "pleie", "helsefag"],
            "bachelor": ["bachelorgrad", "treårig", "lavere nivå"],
            "master": ["mastergrad", "toårig", "høyere nivå"],
            "sykepleier": ["sykepleie", "sykepleiefag"],
            "lege": ["medisin", "medisinske"],
            "lærer": ["lærerutdanning", "grunnskolelærer", "pedagogikk"],
            "ingeniør": ["ingeniørutdanning", "sivilingeniør", "dataingeniør"],
            "jus": ["juridiske", "rettsvitenskapelige", "juss"],
            "psykologi": ["psykologiske", "psykolog"],
            "phd": ["ph.d", "forskerutdanning", "doktorgrad"],
            "vgs": ["videregående"],
        };

        const levelLabels = {
            1: "Utdanningsnivå",
            2: "Fagfelt",
            3: "Faggruppe",
            4: "Utdanningsgruppe",
            5: "Utdanning"
        };

        const levelColors = {
            1: "from-violet-500 to-purple-600",
            2: "from-blue-500 to-cyan-500",
            3: "from-emerald-500 to-teal-500",
            4: "from-amber-500 to-orange-500",
            5: "from-rose-500 to-pink-500"
        };

        // Ikoner (SVG) — alle med aria-hidden="true" (WCAG 1.1.1)
        const icons = {
            graduationCap: `<svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>`,
            search: `<svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>`,
            layers: `<svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/><path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65"/><path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65"/></svg>`,
            chevronRight: `<svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>`,
            arrowLeft: `<svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>`,
            x: `<svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>`,
            copy: `<svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>`,
            checkCircle: `<svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>`,
            sparkles: `<svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>`
        };

        // Hjelpefunksjoner
        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function normalizeText(text) {
            return text
                .toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/[æ]/g, 'ae')
                .replace(/[ø]/g, 'o')
                .replace(/[å]/g, 'a');
        }

        // Kunngjør statusmelding til skjermlesere (WCAG 4.1.3)
        function announce(message) {
            const el = document.getElementById('status-announcer');
            if (el) {
                el.textContent = '';
                // Kort forsinkelse sørger for at skjermleseren oppdager endringen
                setTimeout(() => { el.textContent = message; }, 50);
            }
        }

        // Oppdater sidetittel dynamisk (WCAG 2.4.2)
        function updateTitle(pageTitle) {
            document.title = pageTitle ? `${pageTitle} – NUS-kode Velger` : 'NUS-kode Velger';
        }

        // Flytt fokus til overskrift etter sideskifte (WCAG 2.4.3)
        function focusHeading() {
            setTimeout(() => {
                const heading = document.querySelector('#app h1, #app h2');
                if (heading) {
                    heading.setAttribute('tabindex', '-1');
                    heading.focus();
                }
            }, 50);
        }

        function buildIndices() {
            codeIndex = new Map(nusData.map(item => [item.code, item]));
            childrenIndex = new Map();

            nusData.forEach(item => {
                const parent = item.parentCode || '__root__';
                if (!childrenIndex.has(parent)) {
                    childrenIndex.set(parent, []);
                }
                childrenIndex.get(parent).push(item);
            });

            searchIndex = nusData.map(item => ({
                ...item,
                searchText: normalizeText(item.name),
                normalizedName: item.name.toLowerCase()
            }));
        }

        function getChildren(parentCode) {
            return childrenIndex.get(parentCode || '__root__') || [];
        }

        function buildPath(code) {
            const path = [];
            let current = codeIndex.get(code);
            while (current) {
                path.push(current);
                current = codeIndex.get(current.parentCode);
            }
            return path.reverse();
        }

        function search(query) {
            if (!query.trim() || query.length < 2) return [];

            const cleanedQuery = query.trim().replace(/,/g, ' ').replace(/\s+/g, ' ');
            const normalizedQuery = normalizeText(cleanedQuery);
            const queryWords = normalizedQuery.split(/\s+/).filter(w => w.length > 0);

            const expandedWordsPerQuery = queryWords.map(word => {
                const expanded = new Set([word]);
                const aliasTerms = searchAliases[word];
                if (aliasTerms) {
                    aliasTerms.forEach(t => expanded.add(normalizeText(t)));
                }
                return Array.from(expanded);
            });

            // Kompiler word boundary-regexer én gang, ikke per element
            const wordBoundaryRegexes = queryWords.map(word =>
                new RegExp(`(^|[^a-z])${word}([^a-z]|$)`)
            );

            const scored = searchIndex
                .map(item => {
                    let score = 0;
                    const searchText = item.searchText;
                    const normalizedName = item.normalizedName;

                    if (item.code === cleanedQuery) score += 1000;
                    if (item.code.startsWith(cleanedQuery.replace(/\s+/g, ''))) score += 500;

                    const allWordsMatch = expandedWordsPerQuery.every(expandedTerms =>
                        expandedTerms.some(term => searchText.includes(term))
                    );

                    if (!allWordsMatch && score < 500) {
                        return { item, score: 0 };
                    }

                    if (allWordsMatch) {
                        score += 200;

                        queryWords.forEach((word, i) => {
                            if (searchText.includes(word)) {
                                score += 100;
                                if (wordBoundaryRegexes[i].test(searchText)) {
                                    score += 50;
                                }
                            }
                        });

                        expandedWordsPerQuery.forEach((expandedTerms, idx) => {
                            const originalWord = queryWords[idx];
                            expandedTerms.forEach(term => {
                                if (term !== originalWord && searchText.includes(term)) {
                                    score += 10;
                                }
                            });
                        });
                    }

                    if (score > 0 && item.level === 5) score += 100;
                    if (normalizedName.includes('uspesifisert')) score -= 50;
                    if (normalizedName.includes('utgått')) score -= 100;

                    return { item, score };
                })
                .filter(({ score }) => score > 0)
                .sort((a, b) => b.score - a.score);

            return scored.map(({ item }) => item);
        }

        // Render-funksjoner
        function render() {
            const app = document.getElementById('app');

            switch (state.mode) {
                case 'intro':
                    app.innerHTML = renderIntro();
                    break;
                case 'search':
                    app.innerHTML = renderSearch();
                    setupSearchListeners();
                    break;
                case 'browse':
                    app.innerHTML = renderBrowse();
                    break;
                case 'result':
                    app.innerHTML = renderResult();
                    break;
            }
        }

        function renderIntro() {
            updateTitle('');
            return `
                <div class="min-h-screen flex items-center justify-center p-4 sm:p-6" id="main-content">
                    <div class="max-w-2xl w-full">
                        <div class="text-center mb-10">
                            <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-br from-violet-500 to-purple-600 mb-6 shadow-2xl shadow-violet-500/30 text-white" aria-hidden="true">
                                ${icons.graduationCap}
                            </div>
                            <h1 class="text-3xl sm:text-4xl font-bold text-white mb-3 tracking-tight">
                                Finn din utdanningskode
                            </h1>
                            <p class="text-slate-300 text-lg">
                                Søk blant ${nusData.length.toLocaleString('nb-NO')} NUS-koder
                            </p>
                        </div>

                        <div class="grid gap-4">
                            <button onclick="goToSearch()" class="group relative bg-slate-800/50 backdrop-blur border border-slate-700/50 rounded-2xl p-5 sm:p-6 text-left hover:border-violet-500/50 hover:bg-slate-800/80 transition-all duration-300">
                                <div class="flex items-start gap-4">
                                    <div class="flex-shrink-0 w-12 h-12 rounded-xl bg-gradient-to-br from-violet-500 to-purple-600 flex items-center justify-center group-hover:scale-110 transition-transform text-white" aria-hidden="true">
                                        ${icons.search}
                                    </div>
                                    <div class="flex-1 min-w-0">
                                        <h2 class="text-lg sm:text-xl font-semibold text-white mb-1">Søk etter utdanning</h2>
                                        <p class="text-slate-300 text-sm sm:text-base">Skriv inn utdanningsnavn, forkortelse eller kode</p>
                                    </div>
                                    <div class="text-slate-400 group-hover:text-violet-400 group-hover:translate-x-1 transition-all flex-shrink-0" aria-hidden="true">
                                        ${icons.chevronRight}
                                    </div>
                                </div>
                            </button>

                            <button onclick="goToBrowse()" class="group relative bg-slate-800/50 backdrop-blur border border-slate-700/50 rounded-2xl p-5 sm:p-6 text-left hover:border-emerald-500/50 hover:bg-slate-800/80 transition-all duration-300">
                                <div class="flex items-start gap-4">
                                    <div class="flex-shrink-0 w-12 h-12 rounded-xl bg-gradient-to-br from-emerald-500 to-teal-500 flex items-center justify-center group-hover:scale-110 transition-transform text-white" aria-hidden="true">
                                        ${icons.layers}
                                    </div>
                                    <div class="flex-1 min-w-0">
                                        <h2 class="text-lg sm:text-xl font-semibold text-white mb-1">Bla gjennom kategorier</h2>
                                        <p class="text-slate-300 text-sm sm:text-base">Naviger steg for steg gjennom hierarkiet</p>
                                    </div>
                                    <div class="text-slate-400 group-hover:text-emerald-400 group-hover:translate-x-1 transition-all flex-shrink-0" aria-hidden="true">
                                        ${icons.chevronRight}
                                    </div>
                                </div>
                            </button>
                        </div>

                        <p class="text-center text-slate-400 text-sm mt-8">
                            Norsk standard for utdanningsgruppering (NUS)
                        </p>
                    </div>
                </div>
            `;
        }

        function renderSearch() {
            updateTitle('Søk etter utdanning');
            const results = search(state.searchQuery);
            const displayedResults = state.showAllResults ? results : results.slice(0, 10);

            let resultsHtml = '';

            if (state.searchQuery.length >= 2) {
                if (results.length > 0) {
                    const countText = results.length === 1
                        ? '1 treff'
                        : `${results.length} treff${!state.showAllResults && results.length > 10 ? ' (viser 10)' : ''}`;

                    resultsHtml = `
                        <p class="text-slate-300 text-sm mb-3" aria-live="polite" aria-atomic="true">
                            ${countText}
                        </p>
                        <ul role="list" class="space-y-2 max-h-[60vh] overflow-y-auto pr-1 scrollbar-thin" aria-label="Søkeresultater">
                            ${displayedResults.map(item => `
                                <li role="listitem">
                                    <button onclick="selectFromSearch('${item.code}')" class="w-full bg-slate-800/50 border border-slate-700/50 rounded-xl p-3 sm:p-4 text-left hover:border-violet-500/50 hover:bg-slate-800/80 transition-all group">
                                        <div class="flex items-center gap-3">
                                            <div class="flex-shrink-0 w-9 h-9 sm:w-10 sm:h-10 rounded-lg bg-gradient-to-br ${levelColors[item.level]} flex items-center justify-center" aria-hidden="true">
                                                <span class="text-white text-xs sm:text-sm font-mono">${item.level}</span>
                                            </div>
                                            <div class="flex-1 min-w-0">
                                                <div class="text-white font-medium text-sm sm:text-base truncate">${escapeHtml(item.name)}</div>
                                                <div class="flex items-center gap-2 text-xs sm:text-sm">
                                                    <span class="text-violet-300 font-mono">${item.code}</span>
                                                    <span class="text-slate-400" aria-hidden="true">•</span>
                                                    <span class="text-slate-300">${levelLabels[item.level]}</span>
                                                </div>
                                            </div>
                                            <div class="text-slate-400 group-hover:text-violet-400 group-hover:translate-x-1 transition-all flex-shrink-0" aria-hidden="true">
                                                ${icons.chevronRight}
                                            </div>
                                        </div>
                                    </button>
                                </li>
                            `).join('')}
                            ${!state.showAllResults && results.length > 10 ? `
                                <li role="listitem">
                                    <button onclick="showAllResults()" class="w-full py-3 text-violet-300 hover:text-violet-200 text-sm transition-colors">
                                        Vis alle ${results.length} resultater
                                    </button>
                                </li>
                            ` : ''}
                        </ul>
                    `;
                } else {
                    resultsHtml = `
                        <div class="text-center py-12 text-slate-300" role="status">
                            <p>Ingen resultater for «${escapeHtml(state.searchQuery)}»</p>
                            <p class="text-sm mt-2">Prøv et annet søkeord eller bla gjennom kategorier</p>
                        </div>
                    `;
                }
            } else {
                resultsHtml = `
                    <div class="text-center py-12">
                        <div class="text-slate-600 mx-auto mb-4" aria-hidden="true">${icons.sparkles}</div>
                        <p class="text-slate-300 mb-4">Prøv å søke på:</p>
                        <div class="flex flex-wrap justify-center gap-2" role="list" aria-label="Eksempelsøk">
                            ${['sykepleie', 'informatikk', 'økonomi', 'lærer', 'ingeniør', 'master', 'phd'].map(term => `
                                <button role="listitem" onclick="setSearchQuery('${term}')" class="px-3 py-1.5 bg-slate-800 border border-slate-700 rounded-full text-sm text-slate-200 hover:border-violet-500 hover:text-white transition-colors">
                                    ${term}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            return `
                <div class="min-h-screen p-4 sm:p-6" id="main-content">
                    <div class="max-w-2xl mx-auto">
                        <button onclick="reset()" class="flex items-center gap-2 text-slate-300 hover:text-white mb-6 transition-colors">
                            ${icons.arrowLeft}
                            <span>Tilbake</span>
                        </button>

                        <div class="mb-6">
                            <h1 class="text-xl sm:text-2xl font-bold text-white mb-2">Søk etter utdanning</h1>
                            <p class="text-slate-300 text-sm sm:text-base" id="search-hint">Skriv minst 2 tegn for å søke</p>
                        </div>

                        <div role="search" aria-label="Søk etter NUS-kode">
                            <label for="searchInput" class="sr-only">Søk etter utdanning</label>
                            <div class="relative mb-4">
                                <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" aria-hidden="true">${icons.search}</div>
                                <input
                                    id="searchInput"
                                    type="search"
                                    value="${escapeHtml(state.searchQuery)}"
                                    placeholder="F.eks. sykepleie, informatikk, master..."
                                    aria-describedby="search-hint"
                                    class="w-full bg-slate-800/50 border border-slate-700 rounded-xl pl-12 pr-12 py-4 text-white placeholder-slate-400 focus:outline-none focus:border-violet-500 focus:ring-2 focus:ring-violet-500/50 transition-all"
                                    autocomplete="off"
                                    autocorrect="off"
                                    spellcheck="false"
                                />
                                ${state.searchQuery ? `
                                    <button
                                        onclick="clearSearch()"
                                        aria-label="Tøm søkefeltet"
                                        class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white p-1"
                                    >
                                        ${icons.x}
                                    </button>
                                ` : ''}
                            </div>
                        </div>

                        ${resultsHtml}
                    </div>
                </div>
            `;
        }

        function renderBrowse() {
            const currentLevel = state.selectedPath.length > 0 ? state.selectedPath[state.selectedPath.length - 1] : null;
            const children = getChildren(currentLevel?.code || '');
            const relevantChildren = children
                .filter(c => c.level > 0)
                .sort((a, b) => a.code.localeCompare(b.code));

            const pageTitle = currentLevel ? currentLevel.name : 'Bla gjennom kategorier';
            updateTitle(pageTitle);

            let breadcrumbHtml = '';
            if (state.selectedPath.length > 0) {
                breadcrumbHtml = `
                    <nav aria-label="Brødsmule" class="mb-4">
                        <ol class="flex flex-wrap items-center gap-1 sm:gap-2 text-sm overflow-x-auto pb-2">
                            ${state.selectedPath.map((item, index) => `
                                <li class="flex items-center gap-1 sm:gap-2 flex-shrink-0">
                                    ${index > 0 ? `<span aria-hidden="true" class="text-slate-400">${icons.chevronRight}</span>` : ''}
                                    <button
                                        onclick="goToPathIndex(${index})"
                                        ${index === state.selectedPath.length - 1 ? 'aria-current="page"' : ''}
                                        class="px-2 py-1 rounded-lg transition-colors ${
                                            index === state.selectedPath.length - 1
                                                ? 'bg-violet-500/20 text-violet-200'
                                                : 'text-slate-300 hover:text-white'
                                        }"
                                    >
                                        <span class="hidden sm:inline">${escapeHtml(item.name)}</span>
                                        <span class="sm:hidden">${item.code}</span>
                                    </button>
                                </li>
                            `).join('')}
                        </ol>
                    </nav>
                `;
            }

            const headingText = currentLevel
                ? `Velg ${levelLabels[currentLevel.level + 1]?.toLowerCase() || 'utdanning'}`
                : 'Velg utdanningsnivå';

            return `
                <div class="min-h-screen p-4 sm:p-6" id="main-content">
                    <div class="max-w-2xl mx-auto">
                        <button onclick="goBack()" class="flex items-center gap-2 text-slate-300 hover:text-white mb-6 transition-colors">
                            ${icons.arrowLeft}
                            <span>${state.selectedPath.length > 0 ? 'Tilbake' : 'Start på nytt'}</span>
                        </button>

                        ${breadcrumbHtml}

                        <div class="mb-4">
                            <h1 class="text-xl sm:text-2xl font-bold text-white mb-1">
                                ${headingText}
                            </h1>
                            ${currentLevel ? `<p class="text-slate-300 text-sm sm:text-base truncate">${escapeHtml(currentLevel.name)}</p>` : ''}
                        </div>

                        <ul role="list" class="space-y-2 max-h-[65vh] overflow-y-auto pr-1 scrollbar-thin" aria-label="${headingText}">
                            ${relevantChildren.length > 0 ? relevantChildren.map(item => {
                                const itemChildren = getChildren(item.code);
                                const isLeaf = item.level === 5 || itemChildren.length === 0;
                                const childCount = itemChildren.length;
                                const ariaLabel = isLeaf
                                    ? `${item.name}, kode ${item.code}`
                                    : `${item.name}, kode ${item.code}, ${childCount} underkategorier`;

                                return `
                                    <li role="listitem">
                                        <button
                                            onclick="selectFromBrowse('${item.code}')"
                                            aria-label="${escapeHtml(ariaLabel)}"
                                            class="w-full bg-slate-800/50 border border-slate-700/50 rounded-xl p-3 sm:p-4 text-left hover:border-emerald-500/50 hover:bg-slate-800/80 transition-all group"
                                        >
                                            <div class="flex items-center gap-3">
                                                <div class="flex-shrink-0 w-9 h-9 sm:w-10 sm:h-10 rounded-lg bg-gradient-to-br ${levelColors[item.level]} flex items-center justify-center text-white" aria-hidden="true">
                                                    ${isLeaf ? icons.graduationCap.replace('width="24"', 'width="20"').replace('height="24"', 'height="20"') : `<span class="text-xs sm:text-sm font-mono">${item.level}</span>`}
                                                </div>
                                                <div class="flex-1 min-w-0">
                                                    <span class="text-white font-medium text-sm sm:text-base block truncate" aria-hidden="true">${escapeHtml(item.name)}</span>
                                                    <div class="flex items-center gap-2 text-xs sm:text-sm" aria-hidden="true">
                                                        <span class="text-emerald-300 font-mono">${item.code}</span>
                                                        ${!isLeaf ? `
                                                            <span class="text-slate-400">•</span>
                                                            <span class="text-slate-300">${childCount} valg</span>
                                                        ` : ''}
                                                    </div>
                                                </div>
                                                <div class="text-slate-400 group-hover:text-emerald-400 group-hover:translate-x-1 transition-all flex-shrink-0" aria-hidden="true">
                                                    ${icons.chevronRight}
                                                </div>
                                            </div>
                                        </button>
                                    </li>
                                `;
                            }).join('') : `
                                <li class="text-center py-12 text-slate-300">
                                    <p>Ingen underkategorier funnet</p>
                                </li>
                            `}
                        </ul>
                    </div>
                </div>
            `;
        }

        function renderResult() {
            const item = state.selectedCode;
            if (!item) return '';

            updateTitle(`${item.code} – ${item.name}`);

            return `
                <div class="min-h-screen p-4 sm:p-6" id="main-content">
                    <div class="max-w-2xl mx-auto">
                        <button onclick="reset()" class="flex items-center gap-2 text-slate-300 hover:text-white mb-6 transition-colors">
                            ${icons.arrowLeft}
                            <span>Nytt søk</span>
                        </button>

                        <h1 class="sr-only">Resultat: ${escapeHtml(item.name)}</h1>

                        <div class="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4 sm:p-5 mb-4">
                            <div class="flex items-start justify-between gap-4">
                                <div class="min-w-0">
                                    <p class="text-slate-300 text-sm mb-1" id="nus-label">NUS-kode</p>
                                    <p class="text-2xl sm:text-3xl font-mono font-bold text-white" aria-labelledby="nus-label">${item.code}</p>
                                </div>
                                <button
                                    onclick="copyCode()"
                                    aria-label="${state.copied ? 'Kopiert!' : 'Kopier kode'}"
                                    aria-pressed="${state.copied}"
                                    class="p-2 text-slate-300 hover:text-white hover:bg-slate-700 rounded-lg transition-colors flex-shrink-0"
                                >
                                    ${state.copied ? icons.checkCircle : icons.copy}
                                </button>
                            </div>
                            <p class="text-white mt-3">${escapeHtml(item.name)}</p>
                        </div>

                        <section aria-labelledby="hierarchy-heading" class="bg-slate-800/30 border border-slate-700/30 rounded-xl p-4 sm:p-5">
                            <p class="text-slate-300 text-sm mb-3" id="hierarchy-heading">Hierarki</p>
                            <ol class="space-y-2" aria-label="Utdanningshierarki">
                                ${state.selectedPath.map((p, idx) => `
                                    <li class="flex items-center gap-3 ${idx === state.selectedPath.length - 1 ? 'text-white' : 'text-slate-300'}">
                                        <span class="font-mono text-sm w-16 flex-shrink-0">${p.code}</span>
                                        <span class="text-slate-600" aria-hidden="true">│</span>
                                        <span class="${idx === state.selectedPath.length - 1 ? 'font-medium' : ''}">${escapeHtml(p.name)}</span>
                                    </li>
                                `).join('')}
                            </ol>
                        </section>
                    </div>
                </div>
            `;
        }

        // Event handlers
        function goToSearch() {
            state.mode = 'search';
            state.searchQuery = '';
            render();
            setTimeout(() => document.getElementById('searchInput')?.focus(), 50);
        }

        function goToBrowse() {
            state.mode = 'browse';
            state.selectedPath = [];
            render();
            focusHeading();
        }

        function reset() {
            state = {
                mode: 'intro',
                searchQuery: '',
                selectedPath: [],
                selectedCode: null,
                showAllResults: false,
                copied: false
            };
            render();
            focusHeading();
        }

        function goBack() {
            if (state.selectedPath.length > 0) {
                state.selectedPath = state.selectedPath.slice(0, -1);
                render();
                focusHeading();
            } else {
                reset();
            }
        }

        function goToPathIndex(index) {
            state.selectedPath = state.selectedPath.slice(0, index + 1);
            render();
            focusHeading();
        }

        function setSearchQuery(query) {
            state.searchQuery = query;
            state.showAllResults = false;
            render();
            document.getElementById('searchInput')?.focus();
        }

        function clearSearch() {
            state.searchQuery = '';
            state.showAllResults = false;
            render();
            document.getElementById('searchInput')?.focus();
        }

        function showAllResults() {
            state.showAllResults = true;
            render();
            announce(`Viser alle ${search(state.searchQuery).length} resultater`);
        }

        function selectFromSearch(code) {
            const item = codeIndex.get(code);
            if (item) {
                state.selectedCode = item;
                state.selectedPath = buildPath(code);
                state.mode = 'result';
                render();
                focusHeading();
                announce(`Valgt: ${item.name}, NUS-kode ${item.code}`);
            }
        }

        function selectFromBrowse(code) {
            const item = codeIndex.get(code);
            if (item) {
                const children = getChildren(code);
                const isLeaf = item.level === 5 || children.length === 0;

                state.selectedPath = [...state.selectedPath, item];

                if (isLeaf) {
                    state.selectedCode = item;
                    state.mode = 'result';
                    announce(`Valgt: ${item.name}, NUS-kode ${item.code}`);
                } else {
                    announce(`${item.name}. ${children.length} underkategorier tilgjengelig.`);
                }
                render();
                focusHeading();
            }
        }

        async function copyCode() {
            if (state.selectedCode) {
                try {
                    await navigator.clipboard.writeText(state.selectedCode.code);
                    state.copied = true;
                    render();
                    announce('Kode kopiert til utklippstavlen');
                    setTimeout(() => {
                        state.copied = false;
                        render();
                    }, 2000);
                } catch (e) {
                    announce('Kunne ikke kopiere kode');
                    console.error('Kunne ikke kopiere:', e);
                }
            }
        }

        function setupSearchListeners() {
            const input = document.getElementById('searchInput');
            if (input) {
                input.addEventListener('input', (e) => {
                    const selStart = e.target.selectionStart;
                    const selEnd = e.target.selectionEnd;
                    state.searchQuery = e.target.value;
                    state.showAllResults = false;
                    render();
                    const newInput = document.getElementById('searchInput');
                    if (newInput) {
                        newInput.focus();
                        newInput.setSelectionRange(selStart, selEnd);
                    }
                    // Kunngjør resultatantall etter en liten pause (WCAG 4.1.3)
                    clearTimeout(setupSearchListeners._announceTimer);
                    setupSearchListeners._announceTimer = setTimeout(() => {
                        const results = search(state.searchQuery);
                        if (state.searchQuery.length >= 2) {
                            announce(results.length === 0
                                ? `Ingen resultater for ${state.searchQuery}`
                                : `${results.length} treff`
                            );
                        }
                    }, 600);
                });
            }
        }

        // Last data og start app
        async function init() {
            try {
                const response = await fetch('./data/nus-data.json')
                nusData = await response.json();
                buildIndices();
                render();
            } catch (e) {
                document.getElementById('app').innerHTML = `
                    <div class="min-h-screen flex items-center justify-center p-6" role="alert">
                        <div class="text-center text-red-400">
                            <p class="text-xl mb-2">Kunne ikke laste data</p>
                            <p class="text-sm">${escapeHtml(e.message)}</p>
                        </div>
                    </div>
                `;
            }
        }

        init();
    </script>
</body>
</html>
